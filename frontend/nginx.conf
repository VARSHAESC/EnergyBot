server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the FastAPI backend container.
    # Docker Compose resolves "backend" to the backend service's IP.
    location /api/ {
        proxy_pass         https://stadwerkapp-fhe9f2grc3eqgygv.southindia-01.azurewebsites.net;
        proxy_http_version 1.1;
        proxy_set_header   Host              stadwerkapp-fhe9f2grc3eqgygv.southindia-01.azurewebsites.net;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all unknown routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
}
